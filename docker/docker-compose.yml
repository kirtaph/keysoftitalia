name: keysoftitalia

services:
  web:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: ksit_web
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_AUTH: ${SMTP_AUTH}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: ksit_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_HOST_PORT}:3306"
    volumes:
      - ksit_db_data:/var/lib/mysql
    restart: unless-stopped

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: ksit_pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "${PMA_PORT}:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  ksit_db_data:
    name: stack_all_ksit_db_data
