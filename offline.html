<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sei Offline - Key Soft Italia</title>
  <style>
    :root {
      --ks-orange: #FF6B35;
      --ks-orange-hover: #E85D2C;
      --ks-dark: #1A1F2E;
      --ks-nm-bg: #f0f2f5;
      --ks-nm-light: #ffffff;
      --ks-nm-dark: rgba(165, 177, 198, 0.45);
      --ks-text-primary: #111827;
      --ks-text-secondary: #4b5563;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--ks-nm-bg);
      color: var(--ks-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .offline-container {
      width: 100%;
      max-width: 480px;
      padding: 40px 30px;
      background-color: var(--ks-nm-bg);
      border-radius: 24px;
      box-shadow: 10px 10px 20px var(--ks-nm-dark), -10px -10px 20px var(--ks-nm-light);
      text-align: center;
      transition: all 0.3s ease;
    }

    .logo {
      max-width: 160px;
      height: auto;
      margin-bottom: 30px;
    }

    .icon-wrapper {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background-color: var(--ks-nm-bg);
      box-shadow: inset 6px 6px 12px var(--ks-nm-dark), inset -6px -6px 12px var(--ks-nm-light);
      color: var(--ks-orange);
    }

    .icon-wrapper svg {
      width: 48px;
      height: 48px;
      fill: currentColor;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--ks-dark);
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--ks-text-secondary);
      margin-bottom: 30px;
    }

    .btn-retry {
      display: inline-block;
      width: 100%;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      background-color: var(--ks-orange);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 3px 3px 6px rgba(232, 93, 44, 0.3), -3px -3px 6px rgba(255, 255, 255, 0.5);
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-retry:hover {
      background-color: var(--ks-orange-hover);
      transform: translateY(-2px);
      box-shadow: 5px 5px 10px rgba(232, 93, 44, 0.4), -5px -5px 10px rgba(255, 255, 255, 0.6);
    }

    .btn-retry:active {
      transform: translateY(0);
      box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.2);
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <div class="offline-container">
    <img src="assets/img/logo.png" alt="Key Soft Italia" class="logo">
    
    <div class="icon-wrapper">
      <!-- SVG Wifi-Off -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 20.17L18.83 18H21v-2h-4.17l-3-3H21v-2h-9.17l-3-3H21V6c0-1.1-.9-2-2-2H5.83L3 1.17 1.83 2.34 21.66 22.17 21 20.17zM5 18h8.17l-3-3H5v3zm0-5h3.17l-3-3H5v3zm0-5h3.17L5.66 5.66C5.29 5.89 5 6.41 5 7v1zM16.17 13l-2-2h2v2zm-2-7l-2-2h2v2zM3 20c0 1.1.9 2 2 2h10.17l-2-2H5v-2H3v2z"/>
      </svg>
    </div>

    <h1>Nessuna connessione Internet</h1>
    <p>Sembra che tu sia offline o che la rete sia instabile. Controlla la tua connessione e prova a ricaricare la pagina.</p>
    
    <button onclick="window.location.reload();" class="btn-retry">Riprova a caricare</button>
    
    <div class="footer">
      &copy; <script>document.write(new Date().getFullYear())</script> Key Soft Italia. Tutti i diritti riservati.
    </div>
  </div>

</body>
</html>
